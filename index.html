<script>
function showTab(tab){
  document.getElementById('entryTab').style.display = tab==='entry'?'block':'none';
  document.getElementById('leaderboardTab').style.display = tab==='leaderboard'?'block':'none';
}

document.getElementById("entryForm").addEventListener("submit", function(e){
  e.preventDefault();
  fetch("YOUR_GOOGLE_SCRIPT_URL",{
    method:"POST",
    body:new FormData(e.target)
  }).then(()=>window.location.href="thank-you.html");
});

const deadline = new Date("April 9, 2026 12:00:00 GMT+0200");

function updateCountdown(){
  const now = new Date().getTime();
  const t = deadline - now;

  if(t<=0){
    document.getElementById("countdown").innerHTML="Entries Closed";
    return;
  }

  const d=Math.floor(t/(1000*60*60*24));
  const h=Math.floor((t%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((t%(1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML=
  "Entries close in: "+d+"d "+h+"h "+m+"m";
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>
